name: pages

# Deploys the static leaderboard site (website/public) to GitHub Pages.
# Rebuilds data.json from committed results/ so the published board tracks the
# latest CI benchmark runs.

on:
  push:
    branches: [main]
  # Re-deploy after a benchmark run commits new results (a bot push with the
  # default GITHUB_TOKEN does not itself trigger `push`, so chain explicitly).
  workflow_run:
    workflows: [benchmark]
    types: [completed]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Rebuild leaderboard data from committed results
        # Only rebuild when results exist, so an empty results/ never clobbers
        # the committed data.json that the site ships.
        run: |
          if ls results/*.json >/dev/null 2>&1; then
            bun website/build-data.mjs
          else
            echo "no committed results; keeping existing website/public/data.json"
          fi
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/public
      - id: deployment
        uses: actions/deploy-pages@v4
