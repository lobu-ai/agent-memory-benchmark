name: pages

# Deploys the static leaderboard site (website/public) to GitHub Pages.
# Rebuilds data.json from committed results/ so the published board tracks the
# latest CI benchmark runs.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with: { bun-version: latest }
      - name: Rebuild leaderboard data from committed results
        run: bun website/build-data.mjs || echo "no results yet; using committed data.json"
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/public
      - id: deployment
        uses: actions/deploy-pages@v4
